services:
  app:
    build: .
    ports:
      - "${VS_SERVER_PORT:-5555}:${VS_SERVER_PORT:-5555}"
    env_file:
      - .env
    environment:
      - VS_DB_CONNECTION_STRING=mongodb://mongodb:27017
      - VS_CACHE_FOLDER=/app/.cache
      - VS_VIDEO_FOLDER=/videos
    volumes:
      - cache_data:/app/.cache
      - ${VS_VIDEO_FOLDER:-./videos}:/videos:ro
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
  cache_data:
