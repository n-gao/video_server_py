name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        resolution: [highest, lowest-direct]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev -p ${{ matrix.python-version }} --resolution ${{ matrix.resolution }}

      - name: Run tests
        run: uv run -p ${{ matrix.python-version }} pytest tests/ -v
